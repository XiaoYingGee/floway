# Pull-based Compose for the VM. The CI/CD pipeline ships this file to
# /opt/floway and runs it after pushing a freshly built image to GHCR; unlike
# apps/server/docker-compose.yml (which builds locally) this only ever pulls.
#
#   FLOWAY_IMAGE=ghcr.io/xiaoyinggee/floway:<sha> ADMIN_KEY=... \
#     docker compose -f docker-compose.deploy.yml up -d
#
# The deploy job pins FLOWAY_IMAGE to an immutable commit SHA so a rollback is
# just re-running with a previous tag.

services:
  floway:
    image: ${FLOWAY_IMAGE:-ghcr.io/xiaoyinggee/floway:latest}
    container_name: floway
    pull_policy: always
    ports:
      - "8788:8788"
    environment:
      # Required — the deploy job injects it from the ADMIN_KEY repo secret. The
      # `:?` guard fails fast if it is ever missing instead of booting an
      # admin-locked server.
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY is required}
      RUNTIME_LOCATION: docker
      PORT: "8788"
      # /data is a shared host root; this project is namespaced under /data/floway.
      DATA_DIR: /data/floway
    volumes:
      # Persistent state: floway.db (+ -wal/-shm) and /data/floway/files/.
      - ${FLOWAY_DATA:-/data/floway}:/data/floway
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
