# Self-hosted Floway via Docker Compose.
#
#   cd apps/server
#   ADMIN_KEY=your-secret docker compose up -d --build
#   docker compose logs -f          # follow logs
#   docker compose down             # stop (host data under /data/floway is kept)
#
# Build context is the repo root because the image needs the whole monorepo;
# the Dockerfile and its Dockerfile.dockerignore stay in this folder.

services:
  floway:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    # Local runs build and tag `floway`. The CD pipeline sets FLOWAY_IMAGE to the
    # CI-built GHCR tag (ghcr.io/xiaoyinggee/floway:<sha>) so `docker compose pull`
    # fetches that prebuilt image instead of building on the VM.
    image: ${FLOWAY_IMAGE:-floway}
    container_name: floway
    ports:
      - "8788:8788"
    environment:
      # Override at run time: `ADMIN_KEY=... docker compose up`. Falls back to
      # admin123 for quick local trials — change it for any real deployment.
      ADMIN_KEY: ${ADMIN_KEY:-admin123}
      RUNTIME_LOCATION: docker
      PORT: "8788"
      # /data is a shared host root across projects, so this project is
      # namespaced under /data/floway (not the bare /data).
      DATA_DIR: /data/floway
    volumes:
      # Persistent state lives under the project's namespace on the shared host
      # root: /data/floway/floway.db (+ -wal/-shm) and /data/floway/files/.
      # Bind-mount the host's /data/floway so it sits alongside other projects
      # under /data. Override the host path with FLOWAY_DATA if needed.
      - ${FLOWAY_DATA:-/data/floway}:/data/floway
    restart: unless-stopped
    logging:
      # App logs go to stdout/stderr (12-factor). Docker's json-file driver
      # captures and rotates them; read via `docker compose logs`.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
