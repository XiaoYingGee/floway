services:
  floway:
    build: .
    image: ${FLOWAY_IMAGE:-floway}
    container_name: floway
    ports:
      - "8788:8788"
    environment:
      ADMIN_KEY: ${ADMIN_KEY:-admin123}
      FLOWAY_DB_PATH: /data/floway/floway.db
      FLOWAY_FILES_DIR: /data/floway/files
      PORT: "8788"
    volumes:
      - ${FLOWAY_DATA:-/data/floway}:/data/floway
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
