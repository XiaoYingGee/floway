# Build/validation gate. Runs in two situations:
#   - push to `personal`: early validation of integration work (e.g. right after
#     merging upstream `main` into `personal` and resolving conflicts). personal
#     is pushed directly and never receives PRs, so a push trigger is what catches
#     a broken integration before it reaches a release PR.
#   - PR into `deployment`: the release gate — wired as a required status check on
#     `deployment` protection, so a PR that doesn't compile/bundle cannot merge.
#     deployment only ever changes via PR merge.
name: CI

on:
  push:
    branches: [personal]
  pull_request:
    branches: [deployment]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm/action-setup reads the pinned version from package.json's
      # "packageManager" field (pnpm@10.24.0).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build web console
        run: pnpm --filter @floway-dev/web run build

      - name: Build Docker image
        run: docker build -t floway-ci .
