# Build the self-hosted Floway image, push it to GHCR, and deploy it to the VM
# over SSH. Fires when a PR is merged into `deployment` (a merge is a push) and
# can be run manually to redeploy the current ref.
name: Deploy

on:
  push:
    branches: [deployment]
  workflow_dispatch: {}

# Serialize deploys so two merges in quick succession cannot race on the VM.
concurrency:
  group: deploy-deployment
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/xiaoyinggee/floway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build from the repo root: the image needs the whole monorepo. Tag both a
      # rolling `latest` and the immutable commit SHA; the deploy job pins SHA.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Deploy on the VM by updating its checkout of the deployment source and
      # running its own compose (base docker-compose.yml + the host-specific
      # docker-compose.override.yml, which binds the service to loopback only).
      # The run-scoped GITHUB_TOKEN authenticates both the private-repo fetch and
      # the GHCR pull — valid for the workflow's lifetime, so no creds persist on
      # the VM. The image is the SHA built by build-and-push.
      - name: Update source and restart on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOWAY_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN,FLOWAY_IMAGE,ADMIN_KEY
          script: |
            set -euo pipefail
            REPO="$HOME/codebase/floway"
            # Self-bootstrap: turn the existing source dir into a git checkout on
            # first run. Host-specific files (docker-compose.override.yml) stay
            # untracked and survive the forced checkout.
            [ -d "$REPO/.git" ] || git -C "$REPO" init -q
            git -C "$REPO" fetch --depth 1 \
              "https://x-access-token:${GHCR_TOKEN}@github.com/XiaoYingGee/floway.git" deployment
            git -C "$REPO" checkout -q -f FETCH_HEAD
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd "$REPO/apps/server"
            export FLOWAY_IMAGE ADMIN_KEY
            # No -f: compose auto-merges docker-compose.yml + docker-compose.override.yml.
            docker compose pull
            # The very first pipeline deploy inherits a `floway` container created
            # out-of-band (not labelled for this compose project), which collides
            # on the pinned container_name. Fall back to removing it and retrying;
            # the /data/floway bind mount keeps all state. Subsequent deploys are
            # compose-managed and recreate in place without the fallback.
            docker compose up -d --remove-orphans \
              || { docker rm -f floway >/dev/null 2>&1 || true; docker compose up -d --remove-orphans; }
            docker image prune -f
            docker logout ghcr.io
