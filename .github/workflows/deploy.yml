# Build the self-hosted Floway image, push it to GHCR, and deploy it to the VM
# over SSH. Fires when a PR is merged into `deployment` (a merge is a push) and
# can be run manually to redeploy the current ref.
name: Deploy

on:
  push:
    branches: [deployment]
  workflow_dispatch: {}

# Serialize deploys so two merges in quick succession cannot race on the VM.
concurrency:
  group: deploy-deployment
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/xiaoyinggee/floway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build from the repo root: the image needs the whole monorepo. Tag both a
      # rolling `latest` and the immutable commit SHA; the deploy job pins SHA.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the pull-based compose file to the VM so it always matches the repo.
      - name: Copy compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: apps/server/docker-compose.deploy.yml
          target: /opt/floway
          strip_components: 2

      # Authenticate to GHCR on the VM with the run-scoped GITHUB_TOKEN (valid for
      # the workflow's lifetime, can pull this repo's package — no long-lived PAT),
      # pull the SHA-pinned image, and restart the container.
      - name: Pull and restart on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOWAY_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN,FLOWAY_IMAGE,ADMIN_KEY
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/floway
            export FLOWAY_IMAGE ADMIN_KEY
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
            docker image prune -f
            docker logout ghcr.io
