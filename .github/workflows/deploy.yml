name: Deploy

on:
  push:
    branches: [deployment]
  workflow_dispatch: {}

concurrency:
  group: deploy-deployment
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/xiaoyinggee/floway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update source and restart on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOWAY_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN,FLOWAY_IMAGE,ADMIN_KEY
          script: |
            set -euo pipefail
            REPO="$HOME/codebase/floway"
            [ -d "$REPO/.git" ] || git -C "$REPO" init -q
            git -C "$REPO" fetch --depth 1 \
              "https://x-access-token:${GHCR_TOKEN}@github.com/XiaoYingGee/floway.git" deployment
            git -C "$REPO" checkout -q -f FETCH_HEAD
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd "$REPO"
            export FLOWAY_IMAGE ADMIN_KEY
            docker compose pull
            docker compose up -d --remove-orphans \
              || { docker rm -f floway >/dev/null 2>&1 || true; docker compose up -d --remove-orphans; }
            docker image prune -f
            docker logout ghcr.io
