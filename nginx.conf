map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Shared proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Hashed static assets — long cache, served directly by nginx
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Control-plane / short requests — 1 min timeout (inherited from server block)
    location /api/            { proxy_pass http://app:8788; }
    location /auth            { proxy_pass http://app:8788; }
    location = /embeddings    { proxy_pass http://app:8788; }
    location /images/         { proxy_pass http://app:8788; }
    location = /models        { proxy_pass http://app:8788; }

    # LLM data-plane paths — 10 min timeout for streaming / long-thinking
    location /v1/             { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location /v1beta/         { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location /chat/           { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location = /responses     { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location /responses/      { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location = /messages      { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location /messages/       { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }
    location /azure-api.codex/ { proxy_pass http://app:8788; proxy_read_timeout 600s; proxy_send_timeout 600s; }

    # SPA fallback — all other paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
