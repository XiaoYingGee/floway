server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Hashed static assets — long cache, served directly by nginx
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API and data-plane paths — proxy to Node app
    location /api/ { proxy_pass http://app:8788; }
    location /auth { proxy_pass http://app:8788; }
    location /v1/ { proxy_pass http://app:8788; }
    location /v1beta/ { proxy_pass http://app:8788; }
    location /chat/ { proxy_pass http://app:8788; }
    location /responses { proxy_pass http://app:8788; }
    location /messages { proxy_pass http://app:8788; }
    location /embeddings { proxy_pass http://app:8788; }
    location /images/ { proxy_pass http://app:8788; }
    location /models { proxy_pass http://app:8788; }
    location /azure-api.codex/ { proxy_pass http://app:8788; }

    # SPA fallback — all other paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
}
