server {
    listen 80;
    server_name _;

    # API / data-plane paths → Node app
    location /api/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; }
    location /auth { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; }
    location /v1/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location /v1beta/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location /chat/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location = /responses { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location = /messages { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location /messages/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location = /embeddings { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; }
    location /images/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; }
    location = /models { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; }
    location /azure-api.codex/ { proxy_pass http://app:8788; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_http_version 1.1; proxy_set_header Connection ''; proxy_buffering off; }
    location = /favicon.ico { proxy_pass http://app:8788; }

    # Static web assets (Vue SPA)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
